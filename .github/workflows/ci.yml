name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  windows-x64:
    name: Windows x64 validation
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Windows x64 release-quality gate
        run: pnpm release:check:win-x64

      - name: Upload Windows x64 installer
        uses: actions/upload-artifact@v4
        with:
          name: latotex-windows-x64
          if-no-files-found: error
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

  linux-x64:
    name: Linux x64 validation and package
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Frontend architecture check
        run: pnpm arch:check

      - name: Frontend typecheck
        run: pnpm typecheck

      - name: Frontend unit tests
        run: pnpm test:unit
        env:
          CI: true

      - name: Frontend build
        run: pnpm build

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Linux package
        run: pnpm tauri build --bundles deb,appimage

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: latotex-linux-x64
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

  macos:
    name: macOS ${{ matrix.arch }} validation and package
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
          - arch: arm64
            runner: macos-15
            target: aarch64-apple-darwin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Frontend architecture check
        run: pnpm arch:check

      - name: Frontend typecheck
        run: pnpm typecheck

      - name: Frontend unit tests
        run: pnpm test:unit
        env:
          CI: true

      - name: Frontend build
        run: pnpm build

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --target ${{ matrix.target }}

      - name: macOS package
        run: pnpm tauri build --target ${{ matrix.target }} --bundles dmg

      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: latotex-macos-${{ matrix.arch }}
          if-no-files-found: error
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
