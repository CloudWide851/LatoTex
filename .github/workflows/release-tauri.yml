name: Release Tauri App

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Windows x64 validation gate
        run: pnpm release:validate:win-x64

      - name: Windows x64 signed package gate
        run: pnpm release:package:win-x64:signed
        env:
          LATOTEX_SIGN_CERT_PFX_BASE64: ${{ secrets.LATOTEX_SIGN_CERT_PFX_BASE64 }}
          LATOTEX_SIGN_CERT_PASSWORD: ${{ secrets.LATOTEX_SIGN_CERT_PASSWORD }}
          LATOTEX_SIGN_TIMESTAMP_URL: ${{ secrets.LATOTEX_SIGN_TIMESTAMP_URL }}

      - name: Upload generated Windows installer
        uses: softprops/action-gh-release@v2
        with:
          name: LatoTex ${{ github.ref_name }}
          body: Automated Windows x64 build for ${{ github.ref_name }}.
          draft: false
          prerelease: false
          files: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
