<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>LatoTex Share</title>
    <link rel="stylesheet" href="/assets/pico.min.css" />
    <link rel="stylesheet" href="/assets/share_page_theme.css" />
  </head>
  <body>
    <main class="share-shell">
      <header class="hero-card card">
        <div class="hero-copy">
          <div class="hero-eyebrow" id="share-brand">LatoTex Share</div>
          <h1 id="title-text">LatoTex Collaborative Editing</h1>
          <p id="meta" class="hero-meta">session=-</p>
        </div>
        <div class="hero-status">
          <span class="status-pill" id="status">idle</span>
          <span class="connected-badge" id="connected-badge">idle</span>
        </div>
      </header>

      <section class="control-card card">
        <div class="control-grid">
          <label class="field">
            <span class="field-label" id="identity-label">Identity</span>
            <input id="username" placeholder="Username" maxlength="32" />
          </label>
          <label class="field">
            <span class="field-label" id="password-label">Session password</span>
            <input id="pwd" placeholder="Session password" />
          </label>
          <div class="control-actions">
            <button id="copy-password" class="secondary">Copy Password</button>
            <button id="connect">Join</button>
            <button id="reload-pdf" class="secondary">Reload PDF</button>
          </div>
        </div>
      </section>

      <section class="tab-card card">
        <div class="tab-row">
          <button id="view-tex" class="outline">TeX</button>
          <button id="view-pdf" class="outline">PDF</button>
          <button id="view-comments" class="outline">Comments</button>
        </div>
      </section>

      <section class="layout">
        <section class="card pane workspace-pane active" id="pane-main">
          <div class="pane-header">
            <div>
              <p class="pane-kicker" id="workspace-kicker">Live workspace</p>
              <p class="pane-hint" id="share-hint"></p>
            </div>
            <button id="request-compile" class="secondary">Request Compile</button>
          </div>

          <section id="editor-wrap" class="editor-wrap content-panel">
            <div class="panel-label-row">
              <span class="panel-label" id="editor-panel-label">TeX Editor</span>
              <span class="cursor" id="cursor-info">0-0</span>
            </div>
            <textarea id="editor" rows="16"></textarea>
          </section>

          <section id="pdf-wrap" class="pdf-wrap hidden content-panel">
            <div class="panel-label-row">
              <span class="panel-label" id="pdf-panel-label">PDF Preview</span>
              <div class="pdf-nav">
                <button id="pdf-prev" class="secondary" aria-label="Previous PDF page">&lt;</button>
                <span id="pdf-page-label" class="meta">PDF page 1/1</span>
                <button id="pdf-next" class="secondary" aria-label="Next PDF page">&gt;</button>
              </div>
            </div>
            <iframe id="pdf" title="PDF Preview"></iframe>
            <div id="pdf-text" class="pdf-text">No PDF text available.</div>
          </section>
        </section>

        <aside class="card pane side-pane active" id="pane-side">
          <section class="side-section">
            <div class="side-heading-row">
              <p class="side-kicker" id="presence-kicker">Presence</p>
              <h2 id="participants-title">Collaborators</h2>
            </div>
            <div id="participants" class="participants"></div>
          </section>

          <section class="side-section comments-section">
            <div class="side-heading-row">
              <p class="side-kicker" id="discussion-kicker">Discussion</p>
              <h2 id="comments-title">Comments</h2>
            </div>
            <div id="comments" class="comments"></div>
          </section>

          <section class="comment-composer">
            <div id="quote-preview" class="quote-preview" hidden>
              <div id="quote-source" class="quote-source"></div>
              <div id="quote-content" class="quote-content"></div>
              <button id="clear-quote" class="secondary">Clear Quote</button>
            </div>
            <textarea id="comment-editor" rows="4" placeholder="Write a comment..."></textarea>
            <button id="post-comment">Post</button>
          </section>
        </aside>
      </section>
    </main>

    <button id="quick-quote" class="quick-quote" hidden>Quote</button>
    <script type="module" src="/assets/share_page.js"></script>
  </body>
</html>
