<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>LatoTex Share</title>
    <link rel="stylesheet" href="/assets/pico.min.css" />
    <link rel="stylesheet" href="/assets/share_page_theme.css" />
  </head>
  <body>
    <main class="shell container-fluid">
      <section class="card top-card">
        <div>
          <h1 id="title-text">LatoTex Collaborative Editing</h1>
          <p class="meta" id="meta">session=-</p>
        </div>
        <div class="status-wrap">
          <span class="status-chip" id="status">idle</span>
          <span class="connected-badge" id="connected-badge">idle</span>
        </div>
      </section>

      <section class="card toolbar">
        <input id="username" placeholder="Username" maxlength="32" />
        <input id="pwd" placeholder="Session password" />
        <button id="copy-password" class="secondary">Copy Password</button>
        <button id="connect">Join</button>
        <button id="reload-pdf" class="secondary">Reload PDF</button>
      </section>

      <section class="card tab-row">
        <button id="view-tex" class="outline">TeX</button>
        <button id="view-pdf" class="outline">PDF</button>
        <button id="view-comments" class="outline">Comments</button>
      </section>

      <section class="layout">
        <section class="card pane active" id="pane-main">
          <div class="toolbar-inline">
            <button id="request-compile" class="secondary">Request Compile</button>
            <p class="hint" id="share-hint"></p>
          </div>

          <section id="editor-wrap" class="editor-wrap">
            <textarea id="editor" rows="16"></textarea>
            <div class="cursor" id="cursor-info">0-0</div>
          </section>

          <section id="pdf-wrap" class="pdf-wrap hidden">
            <iframe id="pdf" title="PDF Preview"></iframe>
            <div class="pdf-nav">
              <button id="pdf-prev" class="secondary">&lt;</button>
              <span id="pdf-page-label" class="meta">PDF page 1/1</span>
              <button id="pdf-next" class="secondary">&gt;</button>
            </div>
            <div id="pdf-text" class="pdf-text">No PDF text available.</div>
          </section>
        </section>

        <aside class="card pane active" id="pane-side">
          <h4 id="participants-title">Collaborators</h4>
          <div id="participants" class="participants"></div>

          <h4 id="comments-title">Comments</h4>
          <div id="comments" class="comments"></div>

          <div class="comment-composer">
            <div id="quote-preview" class="quote-preview" hidden>
              <div id="quote-source" class="quote-source"></div>
              <div id="quote-content" class="quote-content"></div>
              <button id="clear-quote" class="secondary">Clear Quote</button>
            </div>
            <textarea id="comment-editor" rows="4" placeholder="Write a comment..."></textarea>
            <button id="post-comment">Post</button>
          </div>
        </aside>
      </section>
    </main>

    <button id="quick-quote" class="quick-quote" hidden>Quote</button>
    <script type="module" src="/assets/share_page.js"></script>
  </body>
</html>
