<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>LatoTex Share</title>
    <link rel="stylesheet" href="/assets/pico.min.css" />
    <link rel="stylesheet" href="/assets/share_page_theme.css" />
  </head>
  <body>
    <main class="share-page">
      <header class="hero-panel shell-panel">
        <div class="hero-copy">
          <p class="eyebrow" id="share-brand">LatoTex Share</p>
          <h1 id="title-text">LatoTex Collaborative Editing</h1>
          <p id="meta" class="hero-meta">Session -</p>
        </div>
        <div class="hero-status">
          <span class="status-pill" id="status">Idle</span>
          <span class="connected-badge" id="connected-badge">Idle</span>
        </div>
      </header>

      <section class="session-strip shell-panel">
        <div class="session-fields">
          <label class="field">
            <span class="field-label" id="identity-label">Identity</span>
            <input id="username" placeholder="Username" maxlength="32" />
          </label>
          <label class="field">
            <span class="field-label" id="password-label">Session password</span>
            <input id="pwd" placeholder="Session password" />
          </label>
        </div>
        <div class="session-actions">
          <button id="copy-password" class="secondary" type="button">Copy password</button>
          <button id="connect" type="button">Join session</button>
          <button id="reload-pdf" class="secondary" type="button">Reload PDF</button>
        </div>
      </section>

      <section class="toolbar-strip shell-panel">
        <div class="toolbar-copy">
          <p class="eyebrow" id="workspace-kicker">Live workspace</p>
          <p id="share-hint" class="toolbar-hint"></p>
        </div>
        <div class="toolbar-actions">
          <div class="tab-row">
            <button id="view-tex" class="outline active" type="button">TeX</button>
            <button id="view-pdf" class="outline" type="button">PDF</button>
            <button id="view-comments" class="outline" type="button">Comments</button>
          </div>
          <button id="request-compile" class="secondary" type="button">Request compile</button>
        </div>
      </section>

      <section class="workspace-grid">
        <section class="shell-panel workspace-panel pane active" id="pane-main">
          <section id="editor-wrap" class="content-panel editor-panel">
            <div class="panel-header">
              <span class="panel-label" id="editor-panel-label">TeX editor</span>
              <span class="cursor" id="cursor-info">0-0</span>
            </div>
            <textarea id="editor" rows="18"></textarea>
          </section>

          <section id="pdf-wrap" class="content-panel pdf-panel hidden">
            <div class="panel-header">
              <span class="panel-label" id="pdf-panel-label">PDF preview</span>
              <div class="pdf-nav">
                <button id="pdf-prev" class="secondary" type="button" aria-label="Previous PDF page">&lt;</button>
                <span id="pdf-page-label" class="meta">PDF page 1/1</span>
                <button id="pdf-next" class="secondary" type="button" aria-label="Next PDF page">&gt;</button>
              </div>
            </div>
            <div id="pdf-canvas-wrap" class="pdf-stage">
              <canvas id="pdf-canvas" hidden></canvas>
              <div id="pdf-empty" class="pdf-empty">No PDF preview is available right now.</div>
            </div>
            <div id="pdf-text" class="pdf-text">No PDF text available.</div>
          </section>
        </section>

        <aside class="side-stack pane active" id="pane-side">
          <section class="shell-panel side-panel">
            <div class="side-heading-row">
              <div>
                <p class="eyebrow" id="presence-kicker">Presence</p>
                <h2 id="participants-title">Collaborators</h2>
              </div>
            </div>
            <div id="participants" class="participants"></div>
          </section>

          <section class="shell-panel side-panel comments-panel">
            <div class="side-heading-row">
              <div>
                <p class="eyebrow" id="discussion-kicker">Discussion</p>
                <h2 id="comments-title">Comments</h2>
              </div>
            </div>
            <div id="comments" class="comments"></div>
            <div class="comment-composer">
              <div id="quote-preview" class="quote-preview" hidden>
                <div id="quote-source" class="quote-source"></div>
                <div id="quote-content" class="quote-content"></div>
                <button id="clear-quote" class="secondary" type="button">Clear quote</button>
              </div>
              <textarea id="comment-editor" rows="4" placeholder="Write a comment..."></textarea>
              <button id="post-comment" type="button">Post</button>
            </div>
          </section>
        </aside>
      </section>
    </main>

    <button id="quick-quote" class="quick-quote" hidden type="button">Quote</button>
    <script type="module" src="/assets/share_page.js"></script>
  </body>
</html>
